apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: host-network-attach
  namespace: system
spec:
  displayName: Attach the host to a network
  params:
    - name: hostId
      type: string
      description: The ID of the host to provision
    - name: network
      type: string
      description: The network to attach the host to
  steps:
    - name: attach-to-network
      image: alpine
      script: |
        #!/bin/sh
        echo network attach $(params.hostId) $(params.network)
#      command:
#        - "network"
#      args:
#        - "attach"
#        - "$(params.hostId)"
#        - "$(params.network)"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: host-network-detach
  namespace: system
spec:
  displayName: Detach the host from a network
  params:
    - name: hostId
      type: string
      description: The ID of the host to provision
    - name: network
      type: string
      description: The network to detach the host from
  steps:
    - name: detach-from-network
      image: alpine
      script: |
        #!/bin/sh
        echo network detach $(params.hostId) $(params.network)
