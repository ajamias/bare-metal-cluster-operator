apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: host-power-on
  namespace: system
spec:
  displayName: Power on the host
  params:
    - name: hostId
      type: string
      description: The ID of the host to power on
  steps:
    - name: power-on
      image: alpine
      script: |
        #!/bin/sh
        echo power on $(params.hostId)
#      command:
#        - "power"
#      args:
#        - "on"
#        - "$(params.hostId)"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: host-power-off
  namespace: system
spec:
  displayName: Power off the host
  params:
    - name: hostId
      type: string
      description: The ID of the host to power off
  steps:
    - name: power-off
      image: alpine
      script: |
        #!/bin/sh
        echo power off $(params.hostId)
#      command:
#        - "power"
#      args:
#        - "off"
#        - "$(params.hostId)"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: host-image-provision
  namespace: system
spec:
  displayName: Provision the host with an image
  params:
    - name: hostId
      type: string
      description: The ID of the host to provision
    - name: imageURL
      type: string
      description: The URL to the image
  steps:
    - name: provision-with-image
      image: alpine
      script: |
        #!/bin/sh
        echo provision $(params.hostId) $(params.imageURL)
#      command:
#        - "provision"
#      args:
#        - "$(params.hostId)"
#        - "$(params.imageURL)"
---
